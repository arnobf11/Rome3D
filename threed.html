<!DOCTYPE html>
<html lang="my">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🌌 3D Lottery Generator - Space Edition | Full Set by BK</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');
    * {
      box-sizing: border-box;
    }
    body {
      font-family: 'Poppins', sans-serif;
      background: radial-gradient(circle at 20% 20%, #0b0f25, #000);
      color: #e0e6ff;
      text-align: center;
      padding: 30px 20px 50px;
      margin: 0;
    }
    h1 { 
      font-size: 2em; 
      color: #8ab4ff; 
      text-shadow: 0 0 15px #4c8cff; 
      margin-bottom: 10px; 
      letter-spacing: 1px;
    }
    .sub {
      font-size: 0.85rem;
      opacity: 0.8;
      margin-bottom: 25px;
    }
    .input-section {
      background: rgba(20,25,45,0.85);
      backdrop-filter: blur(4px);
      border-radius: 32px;
      padding: 25px 30px;
      box-shadow: 0 0 30px rgba(100,150,255,0.25);
      display: inline-block;
      border: 1px solid rgba(100,150,255,0.3);
      width: 100%;
      max-width: 480px;
      transition: 0.3s;
    }
    label { 
      font-weight: 600; 
      color: #b3c4ff; 
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    input[type="text"] {
      padding: 12px 15px; 
      font-size: 1.2rem; 
      width: 200px; 
      text-align: center;
      border-radius: 40px; 
      border: 1px solid #4c8cff; 
      background: #0b0f25; 
      color: #fff;
      margin: 12px 0; 
      outline: none; 
      box-shadow: 0 0 12px rgba(76,140,255,0.2); 
      transition: 0.2s;
      font-family: monospace;
      font-weight: 600;
    }
    input:focus {
      border-color: #aa8eff;
      box-shadow: 0 0 18px #7a5cff;
    }
    .button-row { display:flex; justify-content:center; gap:12px; margin-top:12px; flex-wrap:wrap; }
    button {
      background: linear-gradient(135deg,#4c8cff,#7a5cff);
      color: white; border: none; padding: 10px 22px; border-radius: 40px;
      cursor:pointer; font-weight:600; transition:0.2s; font-size: 0.9rem;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    }
    button:hover { transform: translateY(-2px); box-shadow: 0 0 18px rgba(122,92,255,0.6); }
    .result-section { margin-top: 45px; max-width: 1000px; margin-left:auto; margin-right:auto; text-align:left; }
    #summary {
      background: rgba(25,30,60,0.75); border-radius: 24px; padding: 14px 20px; color:#cbd5ff;
      box-shadow: 0 0 10px rgba(76,140,255,0.2);
      font-family: monospace;
      font-size: 0.95rem;
      backdrop-filter: blur(2px);
      border-left: 4px solid #4c8cff;
    }
    #normalResult {
      background: rgba(10,15,35,0.7);
      padding: 18px 16px;
      border-radius: 28px;
      margin-top: 20px;
      box-shadow: 0 0 20px rgba(80,120,255,0.15);
    }
    .numbers-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 10px;
      margin-top: 16px;
    }
    .number-item {
      background: rgba(100,150,255,0.08);
      border: 1px solid rgba(100,150,255,0.35);
      border-radius: 14px;
      padding: 8px 4px;
      text-align: center;
      font-family: 'Courier New', monospace;
      font-size: 1.1rem;
      font-weight: 500;
      transition: 0.1s;
      color: #dfe9ff;
    }
    .triple-item {
      background: rgba(255,100,100,0.2);
      border-color: rgba(255,140,140,0.7);
      font-weight: bold;
      color: #ffb8b8;
      box-shadow: 0 0 4px rgba(255,80,80,0.4);
    }
    .bk-caption {
      background: linear-gradient(135deg, #1e2a5e, #0f172f);
      display: inline-block;
      padding: 4px 20px;
      border-radius: 40px;
      font-size: 0.9rem;
      margin-bottom: 12px;
      font-weight: 600;
      letter-spacing: 1px;
      border: 1px solid #6d8eff;
    }
    #copyBtn {
      background: linear-gradient(135deg,#00c6fb,#005bea);
      margin-top: 20px;
      padding: 10px 28px;
    }
    #guideBtn {
      position: fixed;
      top: 20px;
      right: 20px;
      background: linear-gradient(135deg,#4c8cff,#00d4ff);
      padding: 8px 20px;
      border-radius: 40px;
      font-weight: 600;
      z-index: 99;
      box-shadow: 0 2px 12px rgba(0,0,0,0.3);
    }
    @media (max-width: 680px) {
      .numbers-grid { grid-template-columns: repeat(4, 1fr); gap: 8px; }
      body { padding: 20px 12px; }
      .input-section { padding: 20px; }
    }
    @media (max-width: 480px) {
      .numbers-grid { grid-template-columns: repeat(3, 1fr); }
    }
    .badge-bk {
      font-size: 0.75rem;
      background: #2a376e;
      border-radius: 20px;
      padding: 2px 12px;
      margin-left: 10px;
    }
    footer {
      margin-top: 50px;
      font-size: 0.7rem;
      opacity: 0.5;
    }
  </style>
</head>
<body>
  <button id="guideBtn" onclick="alert('✨ 3D Generator Guide ✨\n\n1️⃣ Normal mode: enter 3~10 digits (e.g., 12345)\n2️⃣ Special modes:\n   • ခွ → XYX patterns\n   • အပူး → XXY + XYY\n   • 3ထိပ် → fixed 1st digit\n   • 5လယ် → fixed middle digit\n   • 4ပိတ် → fixed last digit\n   • 2ပတ် → contains at least one digit from "2"\n\n⭐ NEW: 0bk , 1bk ... 9bk\n   → instantly shows FULL 100 numbers with sum%10 = bk')">📘 User Guide</button>
  <h1>🌌 3D By Rome</h1>
  

  <div class="input-section">
    <label>🔢 Enter digits or command</label><br>
    <input type="text" id="digits" maxlength="12" placeholder="e.g., 12345  /  0bk  /  ခွ  /  6ပတ်"><br>
    <label><input type="checkbox" id="allowRepeat"> 🔁 Allow Repeats</label><br>
    <div class="button-row">
      <button id="generate">✨ Generate</button>
      <button id="clearBtn">🗑️ Clear</button>
    </div>
  </div>

  <div class="result-section">
    <h2>📡 Results</h2>
    <p id="summary"></p>
    <div id="normalResult"></div>
    <button id="copyBtn" style="display:none;">📋 Copy All Numbers</button>
  </div>
  <footer>support me at telegram @hein2425</footer>

  <script>
    // ---------- DOM elements ----------
    const digitsInput = document.getElementById("digits");
    const allowRepeatCheck = document.getElementById("allowRepeat");
    const generateBtn = document.getElementById("generate");
    const clearBtn = document.getElementById("clearBtn");
    const summaryDiv = document.getElementById("summary");
    const normalResultDiv = document.getElementById("normalResult");
    const copyBtn = document.getElementById("copyBtn");

    let currentNumbersForCopy = [];   // stores latest generated numbers array

    // ---------- Helper: display with triple separation & grid ----------
    function renderNumberSet(numbersArray, modeTitle, extraInfo = "") {
      // numbersArray: array of 3-digit strings (e.g., "123")
      // detect triples (111, 222, ...)
      const triples = numbersArray.filter(num => num[0] === num[1] && num[1] === num[2]);
      const others = numbersArray.filter(num => !(num[0] === num[1] && num[1] === num[2]));
      
      currentNumbersForCopy = [...triples, ...others];
      
      let html = "";
      if (modeTitle) {
        html += `<div class="bk-caption">✨ ${modeTitle}</div>`;
      }
      if (extraInfo) {
        html += `<div style="font-size:0.8rem; margin-bottom:12px; opacity:0.8;">${extraInfo}</div>`;
      }
      
      if (triples.length > 0) {
        html += `<div style="margin-bottom: 18px; color:#ffa2a2;">
          <strong>🔥 Triple Numbers (${triples.length}):</strong>
          <div class="numbers-grid">${triples.map(num => `<div class="number-item triple-item">${num}</div>`).join('')}</div>
        </div>`;
      }
      
      if (others.length > 0) {
        html += `<div><strong>✨ Regular Sets (${others.length}):</strong>
          <div class="numbers-grid">${others.map(num => `<div class="number-item">${num}</div>`).join('')}</div>
        </div>`;
      }
      
      normalResultDiv.innerHTML = html;
      copyBtn.style.display = "inline-block";
      copyBtn.onclick = () => copyToClipboard(currentNumbersForCopy.join(", "));
    }

    function copyToClipboard(text) {
      navigator.clipboard.writeText(text).then(() => {
        copyBtn.innerText = "✅ Copied!";
        setTimeout(() => copyBtn.innerText = "📋 Copy All Numbers", 1500);
      }).catch(() => alert("Press Ctrl+C to copy"));
    }

    // ---------- FULL SET by BK (0bk ~ 9bk) EXACT 100 numbers ----------
    // generate all 000-999, filter by sum%10 === bk, then sort ascending
    function getFullSetByBK(bkDigit) {
      const results = [];
      for (let i = 0; i <= 9; i++) {
        for (let j = 0; j <= 9; j++) {
          for (let k = 0; k <= 9; k++) {
            const sumMod = (i + j + k) % 10;
            if (sumMod === bkDigit) {
              results.push(`${i}${j}${k}`);
            }
          }
        }
      }
      // natural ascending order: already generated i,j,k order ensures numeric sort
      return results;
    }

    // handle bk mode: e.g., "0bk", "5bk", "9bk"
    function processBKMode(inputStr) {
      const match = inputStr.match(/^(\d)bk$/i);   // case insensitive, but lowercase as user type
      if (match) {
        const bkValue = parseInt(match[1], 10);
        if (bkValue >= 0 && bkValue <= 9) {
          const fullSet = getFullSetByBK(bkValue);
          // fullSet length always 100
          const modeCaption = `${bkValue}bk (S mod 10 = ${bkValue}) – ${fullSet.length} numbers`;
          summaryDiv.innerText = `🎯 Mode: ${modeCaption}\n✨ Full 3D set where sum of digits ends with ${bkValue}. Total = ${fullSet.length}`;
          renderNumberSet(fullSet, `🌟 ${bkValue}bk — Complete Set (${fullSet.length} numbers)`, `sum of three digits % 10 = ${bkValue}`);
          return true;
        }
      }
      return false;
    }

    // ----- other existing modes (ခွ၊ အပူး၊ ထိပ်၊ လယ်၊ ပိတ်၊ ပတ်) with unified render & triple handling -----
    function generateKhwe() {
      const results = [];
      for (let x = 0; x <= 9; x++) {
        for (let y = 0; y <= 9; y++) {
          if (x !== y) results.push(`${x}${y}${x}`);
        }
      }
      summaryDiv.innerText = `🎲 Mode: ခွ (XYX pattern)\nTotal unique numbers: ${results.length}`;
      renderNumberSet(results, "ခွ Mode · XYX");
    }

    function generateApue() {
      const xxy = [];
      const xyy = [];
      for (let x = 0; x <= 9; x++) {
        for (let y = 0; y <= 9; y++) {
          if (x !== y) {
            xxy.push(`${x}${x}${y}`);
            xyy.push(`${x}${y}${y}`);
          }
        }
      }
      const all = [...xxy, ...xyy];
      currentNumbersForCopy = all;
      const total = all.length;
      // custom display for အပူး to keep XXY and XYY sections like original but use triple highlight later
      const triplesAll = all.filter(num => num[0] === num[1] && num[1] === num[2]);
      const othersAll = all.filter(num => !(num[0] === num[1] && num[1] === num[2]));
      // but to keep original grouping style, we do XXY + XYY separately
      let html = `<div class="bk-caption">✨ အပူး Mode (XXY + XYY)</div>`;
      html += `<div style="margin-bottom:18px; background:rgba(0,200,100,0.1); border-radius:20px; padding:10px;">
        <strong style="color:#aaffaa;">🌟 XXY (${xxy.length} numbers):</strong>
        <div class="numbers-grid">${xxy.map(n => `<div class="number-item">${n}</div>`).join('')}</div>
      </div>`;
      html += `<div style="margin-bottom:18px; background:rgba(100,100,255,0.1); border-radius:20px; padding:10px;">
        <strong style="color:#bbbbff;">🌙 XYY (${xyy.length} numbers):</strong>
        <div class="numbers-grid">${xyy.map(n => `<div class="number-item">${n}</div>`).join('')}</div>
      </div>`;
      if (triplesAll.length > 0) {
        html += `<div style="margin-top:8px;"><strong>🔥 Triple inside sets:</strong> ${triplesAll.join(', ')}</div>`;
      }
      normalResultDiv.innerHTML = html;
      summaryDiv.innerText = `🎲 Mode: အပူး (XXY + XYY)\nTotal: ${total} combinations`;
      copyBtn.style.display = "inline-block";
      copyBtn.onclick = () => copyToClipboard(all.join(", "));
      currentNumbersForCopy = all;
    }

    // generic for ထိပ် / လယ် / ပိတ် with allowRepeat
    function generateFixedPosition(fixedDigit, position, allowRepeat) {
      const results = [];
      const fixed = fixedDigit.toString();
      for (let a = 0; a <= 9; a++) {
        for (let b = 0; b <= 9; b++) {
          let digits = [];
          if (position === 'first') digits = [fixed, a.toString(), b.toString()];
          else if (position === 'middle') digits = [a.toString(), fixed, b.toString()];
          else digits = [a.toString(), b.toString(), fixed];
          
          if (!allowRepeat) {
            const set = new Set(digits);
            if (set.size !== 3) continue;
          }
          results.push(digits.join(''));
        }
      }
      return results;
    }

    function displayTeitResults(d, allowRepeat) {
      const results = generateFixedPosition(d, 'first', allowRepeat);
      const modeName = `${d}ထိပ် (fixed first digit = ${d})`;
      summaryDiv.innerText = `🎯 Mode: ${modeName} | Allow Repeat: ${allowRepeat ? "Yes" : "No"} | Total: ${results.length}`;
      renderNumberSet(results, modeName);
    }

    function displayLelResults(d, allowRepeat) {
      const results = generateFixedPosition(d, 'middle', allowRepeat);
      const modeName = `${d}လယ် (fixed middle digit = ${d})`;
      summaryDiv.innerText = `🎯 Mode: ${modeName} | Allow Repeat: ${allowRepeat ? "Yes" : "No"} | Total: ${results.length}`;
      renderNumberSet(results, modeName);
    }

    function displayPeitResults(d, allowRepeat) {
      const results = generateFixedPosition(d, 'last', allowRepeat);
      const modeName = `${d}ပိတ် (fixed last digit = ${d})`;
      summaryDiv.innerText = `🎯 Mode: ${modeName} | Allow Repeat: ${allowRepeat ? "Yes" : "No"} | Total: ${results.length}`;
      renderNumberSet(results, modeName);
    }

    // ပတ် mode: digits that contain at least one of given digits
    function displayPatResults(digitStr) {
      const digitsToMatch = digitStr.split('');
      const results = [];
      for (let i = 0; i <= 9; i++) {
        for (let j = 0; j <= 9; j++) {
          for (let k = 0; k <= 9; k++) {
            const str = `${i}${j}${k}`;
            if (digitsToMatch.some(d => str.includes(d))) {
              results.push(str);
            }
          }
        }
      }
      const unique = [...new Set(results)].sort();
      summaryDiv.innerText = `🌀 Mode: ${digitStr}ပတ် (contains any of [${digitStr.split('').join(',')}]) | Total: ${unique.length}`;
      renderNumberSet(unique, `${digitStr}ပတ် · Containment Set`);
    }

    // normal 3D generation from digits string (3~10 chars)
    function generateNormal3D(digitsStr, allowRepeat) {
      const arr = digitsStr.split('');
      let normal = [];
      if (allowRepeat) {
        for (let a of arr)
          for (let b of arr)
            for (let c of arr)
              normal.push(a + b + c);
      } else {
        for (let i = 0; i < arr.length; i++)
          for (let j = 0; j < arr.length; j++)
            for (let k = 0; k < arr.length; k++)
              if (i !== j && j !== k && i !== k)
                normal.push(arr[i] + arr[j] + arr[k]);
      }
      return normal;
    }

    function processNormalMode(digits, allowRepeat) {
      if (digits.length < 3 || digits.length > 10) {
        alert("For normal mode, enter 3 to 10 digits. Example: 12345");
        return false;
      }
      const numbers = generateNormal3D(digits, allowRepeat);
      summaryDiv.innerText = `🔢 Normal Mode | Input: ${digits} | Repeat: ${allowRepeat ? "ON" : "OFF"} | Total: ${numbers.length} combinations`;
      renderNumberSet(numbers, `Combinations from [${digits}]`);
      return true;
    }

    // ------- MAIN GENERATION DISPATCHER -------
    function handleGeneration() {
      let rawInput = digitsInput.value.trim();
      if (rawInput === "") {
        alert("✨ Please enter digits or a command (0bk, ခွ, 3ထိပ်, etc.)");
        return;
      }

      const allowRepeat = allowRepeatCheck.checked;

      // 1) BK MODE: "0bk" to "9bk"
      if (processBKMode(rawInput)) return;

      // 2) Special keyword commands
      if (rawInput === "ခွ") {
        generateKhwe();
        return;
      }
      if (rawInput === "အပူး") {
        generateApue();
        return;
      }

      // 3) patterns: "Xထိပ်" , "Xလယ်", "Xပိတ်", "Xပတ်" (X is digit 0-9)
      const teitMatch = rawInput.match(/^([0-9])ထိပ်$/);
      if (teitMatch) {
        displayTeitResults(teitMatch[1], allowRepeat);
        return;
      }
      const lelMatch = rawInput.match(/^([0-9])လယ်$/);
      if (lelMatch) {
        displayLelResults(lelMatch[1], allowRepeat);
        return;
      }
      const peitMatch = rawInput.match(/^([0-9])ပိတ်$/);
      if (peitMatch) {
        displayPeitResults(peitMatch[1], allowRepeat);
        return;
      }
      const patMatch = rawInput.match(/^([0-9]+)ပတ်$/);
      if (patMatch) {
        displayPatResults(patMatch[1]);
        return;
      }

      // 4) Normal digits mode (only digits, length 3~10)
      if (/^[0-9]+$/.test(rawInput)) {
        processNormalMode(rawInput, allowRepeat);
        return;
      }

      // fallback
      alert("❓ Invalid format. Use digits (3-10), 0bk~9bk, ခွ, အပူး, Xထိပ်, Xလယ်, Xပိတ်, or Xပတ်");
    }

    // clear all fields
    function clearAll() {
      digitsInput.value = "";
      allowRepeatCheck.checked = false;
      summaryDiv.innerText = "";
      normalResultDiv.innerHTML = "";
      copyBtn.style.display = "none";
      currentNumbersForCopy = [];
    }

    // ----- Event listeners -----
    generateBtn.addEventListener("click", handleGeneration);
    clearBtn.addEventListener("click", clearAll);
    // Additional bonus: handle 'Enter' key
    digitsInput.addEventListener("keypress", (e) => {
      if (e.key === "Enter") handleGeneration();
    });

    // small demo message
    console.log("🚀 3D Generator with full BK sets (0bk..9bk) loaded");
  </script>
</body>
</html>
